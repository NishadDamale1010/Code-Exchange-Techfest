<!DOCTYPE html>
<html>
<head>
    <title>MISSION CONTROL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; padding: 20px; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #444; padding-bottom: 20px; gap: 15px; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .team-card { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .online { color: #28a745; font-weight: bold; } .offline { color: #dc3545; }
        .btn { padding: 10px; cursor: pointer; border: none; font-weight: bold; border-radius: 4px; }
        #status { color: #ffcc00; font-size: 0.95rem; }
        .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1 style="margin:0">🚀 Techfest Control</h1>
            <div id="status">Loading control center...</div>
        </div>
        <div class="controls">
            <input type="number" id="team-count-input" value="10" min="1" max="100" style="width:60px; background:#333; color:white; border:1px solid #555; padding:5px;">
            <button class="btn" onclick="updateTeamCount()">SET TEAMS</button>
            <button class="btn" style="background:#ffcc00;" onclick="shuffle('easy')">SHUFFLE EASY</button>
            <button class="btn" style="background:#007acc; color:white;" onclick="startAll()">START ALL</button>
            <button class="btn" style="background:#dc3545; color:white;" onclick="reset()">RESET SYSTEM</button>
        </div>
    </div>
    <div id="team-grid" class="grid"></div>

    <script>
        const isFileProtocol = window.location.protocol === 'file:';
        const api = isFileProtocol ? "http://localhost:8000" : window.location.origin;
        let pool = [];

        function setStatus(message, isError = false) {
            const node = document.getElementById('status');
            node.innerText = message;
            node.style.color = isError ? '#ff5c5c' : '#ffcc00';
        }

        async function requestJson(url, options = {}) {
            const res = await fetch(url, options);
            const data = await res.json();
            if(!res.ok) {
                throw new Error(data.detail || data.message || 'Request failed');
            }
            return data;
        }

        async function refresh() {
            try {
                if(pool.length === 0) {
                    pool = await requestJson(`${api}/api/problem/pool_list`);
                }
                const teams = await requestJson(`${api}/api/admin/status`);
                const grid = document.getElementById('team-grid');
                grid.innerHTML = teams.map(t => `
                    <div class="team-card">
                        <h3>Team ${t.team_id}</h3>
                        <p>P1: <span class="${t.p1_online?'online':'offline'}">${t.p1_online?'● ONLINE':'● OFFLINE'}</span></p>
                        <p>P2: <span class="${t.p2_online?'online':'offline'}">${t.p2_online?'● ONLINE':'● OFFLINE'}</span></p>
                        <select onchange="assign('${t.team_id}', this.value)" style="width:100%; margin:10px 0; background:#333; color:white; padding:5px;">
                            <option value="">Assigned: ${t.assigned}</option>
                            ${pool.map(p => `<option value="${p.id}">${p.id} - ${p.title} (${p.tier})</option>`).join('')}
                        </select>
                        <div style="display:flex; justify-content:space-between; gap:8px;">
                            <button class="btn" style="background:#555; width:48%;" onclick="penalty('${t.team_id}')">-20 PTS</button>
                            <button class="btn" style="background:#333; width:48%; color:#ccc;" onclick="swap('${t.team_id}')">SWAP</button>
                        </div>
                    </div>
                `).join('');
                setStatus(`Updated: ${new Date().toLocaleTimeString()}`);
            } catch (error) {
                setStatus(error.message, true);
            }
        }

        async function assign(tid, pid) {
            if(!pid) return;
            try {
                await requestJson(`${api}/api/admin/assign/${tid}/${pid}`, {method:'POST'});
                setStatus(`Assigned problem ${pid} to Team ${tid}`);
                refresh();
            } catch (error) {
                setStatus(error.message, true);
            }
        }

        async function startAll() {
            try {
                const res = await requestJson(`${api}/api/admin/start-all`, {method:'POST'});
                setStatus(`Started rounds for ${res.teams_started} teams.`);
            } catch (error) {
                setStatus(error.message, true);
            }
        }

        async function shuffle(tier) {
            try {
                await requestJson(`${api}/api/admin/randomize-all/${tier}`, {method:'POST'});
                setStatus(`Randomized all teams with ${tier} problems.`);
                refresh();
            } catch (error) {
                setStatus(error.message, true);
            }
        }

        async function penalty(tid) {
            try {
                await requestJson(`${api}/api/admin/penalty/${tid}`, {method:'POST'});
                setStatus(`Applied penalty to Team ${tid}`);
            } catch (error) {
                setStatus(error.message, true);
            }
        }

        async function swap(tid) {
            try {
                await requestJson(`${api}/api/admin/force-swap/${tid}`, {method:'POST'});
                setStatus(`Forced swap for Team ${tid}`);
            } catch (error) {
                setStatus(error.message, true);
            }
        }

        async function reset() {
            if(confirm("Reset everything?")) {
                try {
                    await requestJson(`${api}/api/admin/reset-db`, {method:'POST'});
                    setStatus('System reset completed.');
                    refresh();
                } catch (error) {
                    setStatus(error.message, true);
                }
            }
        }

        async function updateTeamCount() {
            const count = document.getElementById('team-count-input').value;
            try {
                await requestJson(`${api}/api/admin/set-team-count/${count}`, {method:'POST'});
                setStatus(`Team count updated to ${count}.`);
                refresh();
            } catch (error) {
                setStatus(error.message, true);
            }
        }

        setInterval(refresh, 3000);
        refresh();
    </script>
</body>
</html>
