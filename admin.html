<!DOCTYPE html>
<html>
<head>
    <title>MISSION CONTROL</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; padding: 20px; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #444; padding-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .team-card { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        .online { color: #28a745; font-weight: bold; } .offline { color: #dc3545; }
        .btn { padding: 10px; cursor: pointer; border: none; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Techfest Control</h1>
        <div>
            <input type="number" id="team-count-input" value="10" style="width:50px; background:#333; color:white; border:1px solid #555; padding:5px;">
            <button class="btn" onclick="updateTeamCount()">SET TEAMS</button>
            <button class="btn" style="background:#ffcc00;" onclick="shuffle('easy')">SHUFFLE EASY</button>
            <button class="btn" style="background:#007acc; color:white;" onclick="startAll()">START ALL</button>
            <button class="btn" style="background:#dc3545; color:white;" onclick="reset()">RESET SYSTEM</button>
        </div>
    </div>
    <div id="team-grid" class="grid"></div>

    <script>
        const api = "http://localhost:8000";
        let pool = [];

        async function refresh() {
            if(pool.length === 0) { 
                const r = await fetch(`${api}/api/problem/pool_list`); 
                pool = await r.json(); 
            }
            const res = await fetch(`${api}/api/admin/status`);
            const teams = await res.json();
            const grid = document.getElementById('team-grid');
            grid.innerHTML = teams.map(t => `
                <div class="team-card">
                    <h3>Team ${t.team_id}</h3>
                    <p>P1: <span class="${t.p1_online?'online':'offline'}">${t.p1_online?'● ONLINE':'● OFFLINE'}</span></p>
                    <p>P2: <span class="${t.p2_online?'online':'offline'}">${t.p2_online?'● ONLINE':'● OFFLINE'}</span></p>
                    <select onchange="assign('${t.team_id}', this.value)" style="width:100%; margin:10px 0; background:#333; color:white; padding:5px;">
                        <option>Assigned: ${t.assigned}</option>
                        ${pool.map(p => `<option value="${p.id}">${p.id} - ${p.title}</option>`).join('')}
                    </select>
                    <div style="display:flex; justify-content:space-between;">
                        <button class="btn" style="background:#555; width:48%;" onclick="penalty('${t.team_id}')">-20 PTS</button>
                        <button class="btn" style="background:#333; width:48%; color:#ccc;" onclick="swap('${t.team_id}')">SWAP</button>
                    </div>
                </div>
            `).join('');
        }

        async function assign(tid, pid) { await fetch(`${api}/api/admin/assign/${tid}/${pid}`, {method:'POST'}); refresh(); }
        async function startAll() { await fetch(`${api}/api/admin/start-all`, {method:'POST'}); }
        async function shuffle(tier) { await fetch(`${api}/api/admin/randomize-all/${tier}`, {method:'POST'}); refresh(); }
        async function penalty(tid) { await fetch(`${api}/api/admin/penalty/${tid}`, {method:'POST'}); }
        async function swap(tid) { await fetch(`${api}/api/admin/force-swap/${tid}`, {method:'POST'}); }
        async function reset() { if(confirm("Reset everything?")) { await fetch(`${api}/api/admin/reset-db`, {method:'POST'}); refresh(); } }
        async function updateTeamCount() { const count = document.getElementById('team-count-input').value;
        await fetch(`${api}/api/admin/set-team-count/${count}`, {method:'POST'});
        refresh();
    }
        setInterval(refresh, 3000);
        refresh();
    </script>
</body>
</html>
