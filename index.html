<!DOCTYPE html>
<html>
<head>
    <title>Exchange the Code - IDE</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #1e1e1e; color: white; overflow: hidden; }
        #controls { padding: 10px 20px; background: #2d2d2d; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; height: 50px; }
        #main-layout { display: flex; height: calc(100vh - 50px); }
        #problem-container { width: 35%; padding: 20px; background: #252526; border-right: 1px solid #444; overflow-y: auto; }
        #editor-side { width: 65%; display: flex; flex-direction: column; }
        #editor-container { flex-grow: 1; }
        #console { height: 150px; background: #000; color: #0f0; font-family: 'Consolas', monospace; padding: 10px; border-top: 2px solid #444; overflow-y: auto; }
        .console-msg { margin-bottom: 5px; }
        #status-overlay, #waiting-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .part-badge { background: #ce9178; color: black; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .btn { padding: 5px 15px; cursor: pointer; border: none; font-weight: bold; margin-left: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="status-overlay"><h1>SWAPPING CONTEXT...</h1><p>Linking logic with partner.</p></div>
    <div id="waiting-overlay"><h1>PART A COMPLETE!</h1><p>Waiting for partner to finish...</p></div>
    <div id="controls">
        <span id="player-info">Connecting...</span>
        <span id="timer" style="color:#ffcc00; font-family:monospace; font-weight:bold;">T-MINUS: --s</span>
        <div>
            <select id="lang-select" onchange="changeLanguage()" style="background:#333; color:white; padding:5px;">
                <option value="python">Python</option><option value="cpp">C++</option>
            </select>
            <button class="btn" onclick="requestHint()" style="background:#ffcc00; color:black;">HINT (-20)</button>
            <button class="btn" onclick="runCode()" style="background:#007acc; color:white;">RUN</button>
            <button class="btn" onclick="submitCode()" style="background:#28a745; color:white;">SUBMIT</button>
        </div>
    </div>
    <div id="main-layout">
        <div id="problem-container"><span class="part-badge" id="current-part">PART A</span><h2 id="problem-title">Loading...</h2><div id="problem-desc">...</div></div>
        <div id="editor-side"><div id="editor-container"></div><div id="console"></div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
        let editor;
        const team = prompt("Team ID", "1"), player = prompt("Player (p1/p2)", "p1"), api = "http://localhost:8000";
        document.getElementById('player-info').innerText = `TEAM ${team} | ${player.toUpperCase()}`;

        function printToConsole(msg, type='info') {
            const c = document.getElementById('console');
            const color = type==='success'?'#0f0':(type==='error'?'#f44':'#fff');
            c.innerHTML += `<div class="console-msg">> <span style="color:${color}">${msg}</span></div>`;
            c.scrollTop = c.scrollHeight;
        }

        async function loadProblem() {
            try {
                const p = await fetch(`${api}/api/problem/current/${team}/${player}`);
                const data = await p.json();
                if(data.title) {
                    document.getElementById('problem-title').innerText = data.title;
                    document.getElementById('problem-desc').innerHTML = data.desc;
                }
            } catch(e) {}
        }

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('editor-container'), { value: "# Start\n", language: 'python', theme: 'vs-dark', automaticLayout: true });
            loadProblem();
        });

        const socket = new WebSocket(`ws://localhost:8000/ws/${team}/${player}`);
        socket.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.type === "TIME_UPDATE") document.getElementById('timer').innerText = `T-MINUS: ${d.seconds}s`;
            if(d.type === "NEW_ASSIGNMENT") { printToConsole("Assignment Updated!", "success"); loadProblem(); }
            if(d.type === "STOP_TIMER") document.getElementById('timer').innerText = `T-MINUS: --s`;
            if(d.type === "PHASE_END") handlePhaseEnd();
            if(d.type === "INCOMING_CODE") applySwap(d.code);
            if(d.type === "LOCK_LANG") { document.getElementById('lang-select').value = d.lang; monaco.editor.setModelLanguage(editor.getModel(), d.lang); }
        };

        function handlePhaseEnd() {
            document.getElementById('waiting-overlay').style.display = 'none';
            document.getElementById('status-overlay').style.display = 'flex';
            editor.updateOptions({ readOnly: true });
            socket.send(JSON.stringify({ type: "SWAP", code: editor.getValue() }));
        }

        async function applySwap(newCode) {
            document.getElementById('status-overlay').style.display = 'none';
            document.getElementById('current-part').innerText = "PART B";
            const s = await fetch(`${api}/api/problem/switch/${team}/${player}`);
            const data = await s.json();
            
            document.getElementById('problem-title').innerText = data.title;
            
            document.getElementById('problem-desc').innerHTML = `
                <div style="border: 1px solid #444; padding: 10px; margin-bottom: 15px; background: #2d2d2d; border-radius: 5px;">
                    <h4 style="margin-top:0; color:#ce9178;">Phase A Context: ${data.part_a_title}</h4>
                    <p style="font-size: 0.9em; opacity: 0.8;">${data.part_a_desc}</p>
                    <hr style="border: 0; border-top: 1px solid #444;">
                    <strong>Partner's Goal:</strong> ${data.partner_goal_recap}
                </div>
                <h4 style="color:#28a745;">Your Task (Phase B)</h4>
                <p>${data.desc}</p>
            `;
            
            editor.setValue(newCode + "\n\n# --- PART B START ---\n");
            editor.updateOptions({ readOnly: false });
        }

        async function runCode() {
            const r = await fetch(`${api}/run/${team}/${player}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ code: editor.getValue(), problem_title: document.getElementById('problem-title').innerText, language: document.getElementById('lang-select').value })});
            const res = await r.json(); printToConsole(res.message, res.status === "Success" ? "success" : "error");
        }

        async function submitCode() {
            const r = await fetch(`${api}/submit/${team}/${player}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ code: editor.getValue(), problem_title: document.getElementById('problem-title').innerText, language: document.getElementById('lang-select').value })});
            const res = await r.json(); 
            if(res.status === "Success") {
                printToConsole(res.message, "success");
                if(document.getElementById('current-part').innerText === "PART A") document.getElementById('waiting-overlay').style.display = 'flex';
            } else printToConsole(res.message, "error");
        }

        async function requestHint() {
            if(confirm("Use Hint? (-20 pts penalty)")) {
                await fetch(`${api}/api/admin/penalty/${team}`, {method:'POST'});
                const p = await fetch(`${api}/api/problem/current/${team}/${player}`);
                const data = await p.json(); alert("HINT: " + (data.hint || "No hint for this one!"));
            }
        }

        function changeLanguage() { 
            const l = document.getElementById('lang-select').value;
            monaco.editor.setModelLanguage(editor.getModel(), l);
            socket.send(JSON.stringify({ type: "LANG_CHANGE", lang: l }));
        }
        setInterval(() => { if(socket.readyState === 1) socket.send(JSON.stringify({type: "HEARTBEAT"})); }, 20000);
        setInterval(() => { if(editor) fetch(`${api}/api/save-draft/${team}/${player}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ code: editor.getValue(), language: document.getElementById('lang-select').value })}); }, 10000);
    </script>
</body>
</html>
